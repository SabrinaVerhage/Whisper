<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper Atlas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F3F2F0;
      color: #141018;
      font-family: 'IBM Plex Mono', 'SF Mono', ui-monospace, monospace;
      font-size: 12px;
      height: 100dvh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    #atlasHeader {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 12px;
      gap: 16px;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(243,242,240,0.88) 0%, transparent 100%);
    }
    .atlas-title-wrap { display: flex; flex-direction: column; gap: 3px; }
    #atlasHeader h1 {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 14px; font-weight: 500;
      letter-spacing: 0.01em;
      color: #111111;
    }
    #atlasSubtitle {
      font-size: 8.5px; letter-spacing: 0.06em;
      color: rgba(17,17,17,0.46); text-transform: uppercase;
    }
    #atlasRight {
      display: flex; align-items: center; gap: 12px;
      pointer-events: auto;
    }
    .viewer-dot-wrap {
      display: flex; align-items: center; gap: 6px;
      font-size: 8.5px; color: rgba(17,17,17,0.50);
    }
    .viewer-dot {
      width: 8px; height: 8px;
      border-radius: 50%; flex-shrink: 0;
    }
    #autoRotateBtn {
      background: rgba(17,17,17,0.06);
      border: 1px solid rgba(17,17,17,0.14);
      color: rgba(17,17,17,0.52);
      font: 500 8px 'IBM Plex Mono', monospace;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 11px; border-radius: 12px;
      cursor: pointer; transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    #autoRotateBtn:hover,
    #autoRotateBtn.active {
      background: rgba(106,27,154,0.10);
      border-color: rgba(106,27,154,0.36);
      color: #6A1B9A;
    }

    /* ── Body ── */
    #atlasBody { position: absolute; inset: 0; display: flex; }

    /* ── Canvas wrap ── */
    .canvas-wrap {
      flex: 1; position: relative;
      overflow: hidden; min-width: 0;
    }
    #canvasContainer {
      position: absolute; inset: 0;
      cursor: grab;
    }
    #canvasContainer:active { cursor: grabbing; }
    #canvasContainer canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* Grain */
    .grain-overlay {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      mix-blend-mode: soft-light;
      opacity: 0.22;
    }

    /* ── Detail panel ── */
    #detailPanel {
      width: 280px; flex-shrink: 0;
      background: rgba(243,242,240,0.96);
      backdrop-filter: blur(8px);
      border-left: 1px solid rgba(20,16,24,0.09);
      display: flex; flex-direction: column;
      padding: 54px 20px 18px;
      overflow-y: auto;
    }

    /* ── Dimension lens chips ── */
    #dimLens {
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(20,16,24,0.08);
      margin-bottom: 14px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .dim-lens-label {
      font-size: 7px; letter-spacing: 0.12em;
      color: rgba(20,16,24,0.36); text-transform: uppercase;
      margin-bottom: 2px;
    }
    .dim-lens-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .dim-chip {
      font: 500 7.5px 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
      padding: 3px 8px; border-radius: 10px;
      border: 1px solid rgba(20,16,24,0.12);
      background: rgba(20,16,24,0.04);
      color: rgba(20,16,24,0.50);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .dim-chip:hover {
      border-color: var(--dc);
      color: var(--dc);
    }
    .dim-chip--active {
      border-color: var(--dc) !important;
      color: var(--dc) !important;
      background: rgba(20,16,24,0.06);
      font-weight: 600;
    }

    /* ── Detail header ── */
    .dp-header {
      display: flex; justify-content: space-between;
      align-items: baseline; margin-bottom: 14px;
    }
    .dp-label {
      font-size: 8px; letter-spacing: 0.12em;
      color: rgba(20,16,24,0.38); text-transform: uppercase;
    }
    #dpBy {
      font-size: 8px; letter-spacing: 0.06em;
      color: rgba(20,16,24,0.28);
    }
    #dpTags {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 14px; min-height: 22px;
    }
    .dp-tag {
      font-size: 9px; padding: 4px 9px;
      border-radius: 12px; letter-spacing: 0.06em; font-weight: 500;
    }
    .dp-tag--primary { color: #fff; }
    .dp-tag--secondary {
      background: rgba(20,16,24,0.07);
      color: rgba(20,16,24,0.52);
    }
    .dp-quote-label {
      font-size: 7.5px; letter-spacing: 0.12em;
      color: rgba(20,16,24,0.34); text-transform: uppercase; margin-bottom: 8px;
    }
    #dpQuote {
      font-size: 15px; line-height: 1.45; font-style: italic;
      color: #141018; margin-bottom: 16px; min-height: 42px;
    }
    .dp-section-label {
      font-size: 7.5px; letter-spacing: 0.10em;
      color: rgba(20,16,24,0.38); text-transform: uppercase;
      margin-bottom: 8px; margin-top: 6px;
    }
    .dp-bars { display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }
    .dp-bar-row {
      display: flex; align-items: center; gap: 6px;
      position: relative; padding-left: 4px;
      transition: opacity 0.2s;
    }
    .dp-bar-row--active::before {
      content: '';
      position: absolute;
      left: -4px; top: 0; bottom: 0;
      width: 2px;
      background: var(--bar-accent, #9055D4);
      border-radius: 1px;
    }
    .dp-bar-label {
      font-size: 8.5px; color: rgba(20,16,24,0.52);
      width: 74px; flex-shrink: 0;
      text-align: right; letter-spacing: 0.03em;
    }
    .dp-bar-row--active .dp-bar-label { color: rgba(20,16,24,0.80); }
    .dp-bar-track {
      flex: 1; height: 4px;
      background: rgba(20,16,24,0.08); border-radius: 2px; overflow: hidden;
    }
    .dp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
    .dp-bar-val {
      font-size: 8px; color: rgba(20,16,24,0.36);
      width: 26px; text-align: right;
    }
    #dpFooter {
      margin-top: auto; padding-top: 14px;
      font-size: 7.5px; color: rgba(20,16,24,0.30);
      letter-spacing: 0.05em; line-height: 1.6;
    }

    /* ── Empty state ── */
    .dp-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: rgba(20,16,24,0.22);
      font-size: 11px; text-align: center; padding: 24px;
    }
    .dp-empty-icon { font-size: 28px; opacity: 0.35; }

    /* ── Loading ── */
    .center-msg {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: rgba(20,16,24,0.36);
      font-size: 12px; font-family: 'IBM Plex Mono', monospace;
      pointer-events: none;
    }

    /* ── Fingerprint overlay ── */
    #umapFpCanvas {
      position: absolute; pointer-events: none; z-index: 5;
    }
    #umapFpLabel {
      position: absolute; pointer-events: none; z-index: 6;
      font: 500 8px 'IBM Plex Mono', monospace;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: #111111;
      background: rgba(243,242,240,0.90);
      padding: 4px 9px; border-radius: 4px;
      white-space: nowrap; transform: translateX(-50%);
      opacity: 0; transition: opacity 0.3s ease;
      box-shadow: 0 1px 4px rgba(20,16,24,0.12);
    }
    #umapFpLabel.visible { opacity: 1; }
  </style>
</head>
<body>

<svg style="position:absolute;width:0;height:0">
  <defs>
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
</svg>

<div id="atlasHeader">
  <div class="atlas-title-wrap">
    <h1>Whisper Atlas</h1>
    <span id="atlasSubtitle">loading…</span>
  </div>
  <div id="atlasRight">
    <button id="autoRotateBtn">orbit</button>
    <div id="viewerDots"></div>
  </div>
</div>

<div id="atlasBody">
  <div class="canvas-wrap">
    <div id="canvasContainer"></div>

    <canvas id="umapFpCanvas" hidden></canvas>
    <div id="umapFpLabel"></div>

    <svg class="grain-overlay" aria-hidden="true">
      <rect width="100%" height="100%" filter="url(#grain-filter)"/>
    </svg>

    <div id="centerMsg" class="center-msg">
      <span style="font-size:28px;opacity:0.18">◇</span>
      <span>loading field…</span>
    </div>
  </div>

  <div id="detailPanel">
    <!-- Dimension lens — always visible -->
    <div id="dimLens">
      <div class="dim-lens-label">focus dimension</div>
      <div class="dim-lens-row" id="acousticChips"></div>
      <div class="dim-lens-row" id="semanticChips"></div>
    </div>

    <div class="dp-header">
      <span class="dp-label">Inspecting</span>
      <span id="dpBy"></span>
    </div>
    <div id="dpTags"></div>
    <p class="dp-quote-label">What was said</p>
    <blockquote id="dpQuote"></blockquote>
    <div class="dp-section-label">Acoustic</div>

    <div id="dpSemanticSection">
      <div class="dp-section-label">Semantic</div>

    <div class="dp-empty" id="dpEmpty">
      <span class="dp-empty-icon">◌</span>
      <span>click a whisper<br>to inspect it</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="/public/fingerprint.js"></script>
<script>
/* ── Dimensions ─────────────────────────────────────────────────────────── */
const ACOUSTIC_DIMS = ['breathiness','darkness','softness','slowness','pitchLowness','pitchSteadiness'];
const ACOUSTIC_LABELS = {
  breathiness:'breathiness', darkness:'darkness', softness:'softness',
  slowness:'slowness', pitchLowness:'pitch low', pitchSteadiness:'pitch steady',
};
const SEMANTIC_DIMS = ['sensory','relational','taboo','tenderness','fantasy','identity','longing','unspeakable'];
const DIM_COLORS = {
  breathiness:     '#FF2D8E',
  darkness:        '#9055D4',
  slowness:        '#C060E0',
  softness:        '#FF8A2B',
  pitchLowness:    '#FF5070',
  pitchSteadiness: '#FFAE00',
};
const SEM_COLOR  = '#9055D4';
const FLOOR_Y    = -2.2;

/* ── Feature helpers ─────────────────────────────────────────────────────── */
function featureVec(w) {
  const c = w.sensuality?.components || {};
  if (!Object.keys(c).length) return null;
  const acoustic = ACOUSTIC_DIMS.map(k => c[k] != null ? c[k] : 0.5);
  const sem      = w.llm?.semantics || {};
  const semantic = SEMANTIC_DIMS.map(k => sem[k] != null ? Number(sem[k]) : 0.5);
  return [...acoustic, ...semantic];
}

function dominantDim(w) {
  const c = w.sensuality?.components || {};
  let best = 'breathiness', bestVal = -1;
  for (const k of ACOUSTIC_DIMS) { const v = c[k] ?? 0; if (v > bestVal) { bestVal = v; best = k; } }
  return best;
}

function topSemanticDim(w) {
  const sem = w.llm?.semantics;
  if (!sem) return null;
  let best = null, bestVal = -1;
  for (const k of SEMANTIC_DIMS) { const v = Number(sem[k]); if (v > bestVal) { bestVal = v; best = k; } }
  return bestVal >= 0.4 ? best : null;
}

function getDimValue(w, dim) {
  if (ACOUSTIC_DIMS.includes(dim)) return w.sensuality?.components?.[dim] ?? 0.5;
  return Number(w.llm?.semantics?.[dim] ?? 0.5);
}

/* ── Color helpers ───────────────────────────────────────────────────────── */
function lerpColor(hexA, hexB, t) {
  const ar = (hexA >> 16) & 0xff, ag = (hexA >> 8) & 0xff, ab = hexA & 0xff;
  const br = (hexB >> 16) & 0xff, bg = (hexB >> 8) & 0xff, bb = hexB & 0xff;
  const r  = Math.round(ar + (br - ar) * t);
  const g  = Math.round(ag + (bg - ag) * t);
  const b  = Math.round(ab + (bb - ab) * t);
  return (r << 16) | (g << 8) | b;
}

/* ── PCA 3D ──────────────────────────────────────────────────────────────── */
function pca3d(data) {
  const n = data.length, d = data[0].length;
  const mean = new Array(d).fill(0);
  for (const v of data) v.forEach((x, i) => { mean[i] += x / n; });
  const C = data.map(v => v.map((x, i) => x - mean[i]));
  const cov = Array.from({length: d}, (_, i) =>
    Array.from({length: d}, (_, j) => C.reduce((s, v) => s + v[i] * v[j], 0) / n));
  function mv(m, v)  { return m.map(row => row.reduce((s, x, j) => s + x * v[j], 0)); }
  function dot(a, b) { return a.reduce((s, x, i) => s + x * b[i], 0); }
  function nrm(v)    { const l = Math.sqrt(dot(v, v)); return v.map(x => x / (l || 1)); }
  let v1 = nrm(new Array(d).fill(0).map((_, i) => i === 0 ? 1 : 0.1));
  for (let i = 0; i < 120; i++) v1 = nrm(mv(cov, v1));
  let v2 = nrm(new Array(d).fill(0).map((_, i) => i === 1 ? 1 : 0.1));
  for (let i = 0; i < 120; i++) {
    let u = mv(cov, v2);
    u = u.map((x, k) => x - dot(u, v1) * v1[k]);
    v2 = nrm(u);
  }
  let v3 = nrm(new Array(d).fill(0).map((_, i) => i === 2 ? 1 : 0.1));
  for (let i = 0; i < 120; i++) {
    let u = mv(cov, v3);
    u = u.map((x, k) => x - dot(u, v1) * v1[k] - dot(u, v2) * v2[k]);
    v3 = nrm(u);
  }
  return C.map(v => [dot(v, v1), dot(v, v2), dot(v, v3)]);
}

/* ── t-SNE 3D ────────────────────────────────────────────────────────────── */
function tsneLayout3d(data, initPos) {
  const n = data.length, d = data[0].length;
  const perp = Math.min(n - 1, Math.max(2, Math.floor(n / 4)));
  const hdist = Array.from({length: n}, (_, i) =>
    Array.from({length: n}, (_, j) => {
      let s = 0;
      for (let k = 0; k < d; k++) { const dv = data[i][k] - data[j][k]; s += dv * dv; }
      return Math.sqrt(s);
    }));
  const P = Array.from({length: n}, (_, i) => {
    const row = hdist[i].slice().sort((a, b) => a - b);
    const bw  = (row[perp] || row[row.length - 1]) ** 2 / 2 + 1e-8;
    const aff = hdist[i].map((d, j) => j === i ? 0 : Math.exp(-d * d / bw));
    const sum = aff.reduce((a, x) => a + x, 0);
    return aff.map(x => x / (sum + 1e-10));
  });
  const Psym = Array.from({length: n}, (_, i) =>
    Array.from({length: n}, (_, j) => (P[i][j] + P[j][i]) / (2 * n)));
  let pos = initPos.map(([x, y, z]) => [x * 0.05, y * 0.05, z * 0.05]);
  let mom = Array.from({length: n}, () => [0, 0, 0]);
  for (let iter = 0; iter < 350; iter++) {
    const lr     = 200 * Math.max(0.01, 1 - iter / 350);
    const mScale = iter < 100 ? 0.5 : 0.8;
    const Q = Array.from({length: n}, (_, i) =>
      Array.from({length: n}, (_, j) => {
        if (i === j) return 0;
        const dx = pos[i][0]-pos[j][0], dy = pos[i][1]-pos[j][1], dz = pos[i][2]-pos[j][2];
        return 1 / (1 + dx*dx + dy*dy + dz*dz);
      }));
    const qsum = Q.reduce((s, row) => s + row.reduce((a, x) => a + x, 0), 0);
    const grad = Array.from({length: n}, () => [0, 0, 0]);
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const pij = Psym[i][j];
        const qij = Q[i][j] / (qsum + 1e-10);
        const f   = 4 * (pij - qij) * Q[i][j];
        const dx  = pos[i][0]-pos[j][0], dy = pos[i][1]-pos[j][1], dz = pos[i][2]-pos[j][2];
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) + 1e-8;
        grad[i][0] += f * dx / dist;
        grad[i][1] += f * dy / dist;
        grad[i][2] += f * dz / dist;
      }
    }
    for (let i = 0; i < n; i++) {
      mom[i][0] = mScale * mom[i][0] + lr * grad[i][0];
      mom[i][1] = mScale * mom[i][1] + lr * grad[i][1];
      mom[i][2] = mScale * mom[i][2] + lr * grad[i][2];
      pos[i][0] += mom[i][0];
      pos[i][1] += mom[i][1];
      pos[i][2] += mom[i][2];
    }
  }
  return pos;
}

/* ── Scale to scene units ────────────────────────────────────────────────── */
function normPositions(raw) {
  let xlo=Infinity,xhi=-Infinity,ylo=Infinity,yhi=-Infinity,zlo=Infinity,zhi=-Infinity;
  for (const [x,y,z] of raw) {
    if(x<xlo)xlo=x; if(x>xhi)xhi=x;
    if(y<ylo)ylo=y; if(y>yhi)yhi=y;
    if(z<zlo)zlo=z; if(z>zhi)zhi=z;
  }
  const rx=xhi-xlo||1, ry=yhi-ylo||1, rz=zhi-zlo||1;
  return raw.map(([x,y,z]) => [
    ((x-xlo)/rx - 0.5) * 7.0,
    ((y-ylo)/ry - 0.5) * 1.4,
    ((z-zlo)/rz - 0.5) * 7.0,
  ]);
}

/* ── App state ───────────────────────────────────────────────────────────── */
let points        = [];
let pinnedId      = null;
let pinnedWhisper = null;
let wsViewers     = [];
let whisperMap    = new Map();
let focusDim      = null;
let _umapFpRenderer = null;
let _fpCfg = {};
const FP_SIZE = 340;

/* ── Three.js state ──────────────────────────────────────────────────────── */
let scene, camera, renderer, raycaster;
let orbGroup    = null;
let orbMeshes   = [];
let pinnedRing  = null;
let hoveredMesh = null;
let autoRotate  = false;

const sph = { theta: 0.65, phi: 1.05, radius: 8.5 };
let isDragging   = false;
let dragStart    = null;
let dragSphStart = null;
const DRAG_THRESHOLD = 4;
const mouseNorm  = new THREE.Vector2(9999, 9999);

/* ── Scene init ──────────────────────────────────────────────────────────── */
function initScene() {
  const container = document.getElementById('canvasContainer');
  const W = container.clientWidth, H = container.clientHeight;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xF3F2F0);
  scene.fog = new THREE.FogExp2(0xF3F2F0, 0.045);

  camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 100);
  updateCamera();

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  container.appendChild(renderer.domElement);

  raycaster = new THREE.Raycaster();

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dir = new THREE.DirectionalLight(0xffffff, 0.4);
  dir.position.set(3, 5, 3);
  scene.add(dir);

  buildFloorGrid();
  orbGroup = new THREE.Group();
  scene.add(orbGroup);

  bindControls(container);
  animate();
}

function updateCamera() {
  const { theta, phi, radius } = sph;
  camera.position.set(
    radius * Math.sin(phi) * Math.sin(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.cos(theta)
  );
  camera.lookAt(0, 0, 0);
}

/* ── Floor grid ──────────────────────────────────────────────────────────── */
function buildFloorGrid() {
  const mat  = new THREE.LineBasicMaterial({ color: 0x141018, transparent: true, opacity: 0.07 });
  const SIZE = 5;
  for (let i = -SIZE; i <= SIZE; i++) {
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(i, FLOOR_Y, -SIZE), new THREE.Vector3(i, FLOOR_Y, SIZE),
    ]), mat));
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-SIZE, FLOOR_Y, i), new THREE.Vector3(SIZE, FLOOR_Y, i),
    ]), mat));
  }
}

/* ── Build orbs ──────────────────────────────────────────────────────────── */
function buildOrbs() {
  while (orbGroup.children.length) orbGroup.remove(orbGroup.children[0]);
  orbMeshes = [];
  if (pinnedRing) { pinnedRing = null; }

  for (const p of points) {
    const hex = parseInt(p.color.replace('#',''), 16);
    const r   = p.r * 0.022;

    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(r, 14, 10),
      new THREE.MeshBasicMaterial({ color: hex })
    );
    mesh.position.set(p.x3d, p.y3d, p.z3d);
    mesh.userData.point = p;
    orbGroup.add(mesh);

    const glowMesh = new THREE.Mesh(
      new THREE.SphereGeometry(r * 2.8, 10, 8),
      new THREE.MeshBasicMaterial({ color: hex, transparent: true, opacity: 0.12 })
    );
    glowMesh.position.copy(mesh.position);
    orbGroup.add(glowMesh);

    const stalk = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(p.x3d, p.y3d, p.z3d),
        new THREE.Vector3(p.x3d, FLOOR_Y, p.z3d),
      ]),
      new THREE.LineBasicMaterial({ color: hex, transparent: true, opacity: 0.18 })
    );
    orbGroup.add(stalk);

    orbMeshes.push({ mesh, glowMesh, stalk, point: p });
  }

  // Restore pinned ring
  if (pinnedId) {
    const pt = points.find(p => p.w.id === pinnedId);
    if (pt) setPinnedRing(pt);
  }

  applyDimFocus();
}

/* ── Dimension focus ─────────────────────────────────────────────────────── */
function applyDimFocus() {
  for (const { mesh, glowMesh, point } of orbMeshes) {
    if (!focusDim) {
      mesh.scale.setScalar(1);
      glowMesh.scale.setScalar(1);
      glowMesh.material.opacity = 0.12;
      mesh.material.color.setHex(parseInt(point.color.replace('#',''), 16));
    } else {
      const val    = getDimValue(point.w, focusDim);
      const sc     = 0.3 + val * 1.9;
      const dimHex = parseInt((DIM_COLORS[focusDim] || SEM_COLOR).replace('#',''), 16);
      mesh.scale.setScalar(sc);
      glowMesh.scale.setScalar(sc);
      glowMesh.material.opacity = 0.04 + val * 0.28;
      mesh.material.color.setHex(lerpColor(0xcccccc, dimHex, val));
    }
  }
}

function buildDimChips() {
  const showSemantics = !!_fpCfg.showSemanticLabels;

  document.getElementById('acousticChips').innerHTML = ACOUSTIC_DIMS.map(k => {
    const color = DIM_COLORS[k] || SEM_COLOR;
    const label = ACOUSTIC_LABELS[k] || k;
    const active = focusDim === k ? ' dim-chip--active' : '';
    return `<button class="dim-chip${active}" data-dim="${k}" style="--dc:${color}">${label}</button>`;
  }).join('');

  const semRow = document.getElementById('semanticChips');
  semRow.style.display = showSemantics ? '' : 'none';
  semRow.innerHTML = showSemantics ? SEMANTIC_DIMS.map(k => {
    const active = focusDim === k ? ' dim-chip--active' : '';
    return `<button class="dim-chip${active}" data-dim="${k}" style="--dc:${SEM_COLOR}">${k}</button>`;
  }).join('') : '';

  document.querySelectorAll('.dim-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const dim = btn.dataset.dim;
      focusDim  = focusDim === dim ? null : dim;
      buildDimChips();
      applyDimFocus();
      if (pinnedWhisper) {
        const pt = points.find(p => p.w.id === pinnedId);
        if (pt) renderDetailPanel(pt.w, pt);
      }
    });
  });
}

/* ── Render loop ─────────────────────────────────────────────────────────── */
function animate() {
  requestAnimationFrame(animate);

  if (autoRotate) {
    sph.theta += 0.0025;
    updateCamera();
  }

  // Reset scales only when not in focus mode
  if (!focusDim) {
    for (const { mesh, glowMesh, point } of orbMeshes) {
      mesh.scale.setScalar(1);
      glowMesh.scale.setScalar(1);
      glowMesh.material.opacity = 0.12;
      mesh.material.color.setHex(parseInt(point.color.replace('#',''), 16));
    }
  }

  // Hover
  if (!isDragging) {
    raycaster.setFromCamera(mouseNorm, camera);
    const hits = raycaster.intersectObjects(orbMeshes.map(o => o.mesh));
    const hit  = hits.length ? hits[0].object : null;

    if (hit !== hoveredMesh) {
      if (hoveredMesh && hoveredMesh.userData.point?.w.id !== pinnedId) {
        closeHoverFingerprint();
      }
      hoveredMesh = hit;
      if (hoveredMesh) {
        const p  = hoveredMesh.userData.point;
        const sp = projectToScreen(p.x3d, p.y3d, p.z3d);
        openHoverFingerprint(p.w, sp.x, sp.y);
      }
    }

    // Scale hover only in normal mode (focus mode handles its own scale)
    if (hoveredMesh && !focusDim) {
      const entry = orbMeshes.find(o => o.mesh === hoveredMesh);
      if (entry) {
        hoveredMesh.scale.setScalar(1.6);
        entry.glowMesh.scale.setScalar(1.5);
        entry.glowMesh.material.opacity = 0.26;
      }
    }
  }

  renderer.render(scene, camera);
}

/* ── Screen projection ───────────────────────────────────────────────────── */
function projectToScreen(x3d, y3d, z3d) {
  const v    = new THREE.Vector3(x3d, y3d, z3d).project(camera);
  const rect = renderer.domElement.getBoundingClientRect();
  return {
    x: (v.x * 0.5 + 0.5) * rect.width,
    y: (-v.y * 0.5 + 0.5) * rect.height,
  };
}

/* ── Pinned ring ─────────────────────────────────────────────────────────── */
function setPinnedRing(point) {
  if (pinnedRing) { orbGroup.remove(pinnedRing); pinnedRing = null; }
  if (!point) return;
  const r   = point.r * 0.022;
  const hex = parseInt(point.color.replace('#',''), 16);
  pinnedRing = new THREE.Mesh(
    new THREE.SphereGeometry(r * 2.2, 14, 10),
    new THREE.MeshBasicMaterial({ color: hex, wireframe: true, transparent: true, opacity: 0.38 })
  );
  pinnedRing.position.set(point.x3d, point.y3d, point.z3d);
  orbGroup.add(pinnedRing);
}

/* ── Click → select ─────────────────────────────────────────────────────── */
function selectOrb(mesh) {
  if (!mesh) return;
  const p = mesh.userData.point;
  pinnedId      = p.w.id;
  pinnedWhisper = p.w;
  setPinnedRing(p);
  renderDetailPanel(p.w, p);
  const sp = projectToScreen(p.x3d, p.y3d, p.z3d);
  openHoverFingerprint(p.w, sp.x, sp.y);
}

/* ── Input controls ──────────────────────────────────────────────────────── */
function bindControls(container) {
  const el = renderer.domElement;

  el.addEventListener('mousemove', e => {
    const rect = el.getBoundingClientRect();
    mouseNorm.x = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
    mouseNorm.y = ((e.clientY - rect.top)  / rect.height) * -2 + 1;
    if (isDragging && dragStart) onDragMove(e);
  });

  el.addEventListener('mousedown', e => {
    isDragging   = false;
    dragStart    = { x: e.clientX, y: e.clientY };
    dragSphStart = { theta: sph.theta, phi: sph.phi };
  });

  el.addEventListener('mouseup', e => {
    const wasD = isDragging;
    isDragging = false;
    dragStart  = null;
    if (!wasD) {
      raycaster.setFromCamera(mouseNorm, camera);
      const hits = raycaster.intersectObjects(orbMeshes.map(o => o.mesh));
      if (hits.length) selectOrb(hits[0].object);
    }
  });

  el.addEventListener('mouseleave', () => {
    isDragging = false; dragStart = null;
    mouseNorm.set(9999, 9999);
  });

  el.addEventListener('wheel', e => {
    sph.radius = Math.max(2.5, Math.min(18, sph.radius + e.deltaY * 0.012));
    updateCamera();
  }, { passive: true });

  // Touch orbit
  let lastTouch = null;
  el.addEventListener('touchstart', e => {
    if (e.touches.length === 1) lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    if (e.touches.length !== 1 || !lastTouch) return;
    const dx = e.touches[0].clientX - lastTouch.x;
    const dy = e.touches[0].clientY - lastTouch.y;
    sph.theta -= dx * 0.005;
    sph.phi    = Math.max(0.15, Math.min(Math.PI - 0.15, sph.phi + dy * 0.005));
    updateCamera();
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });

  document.getElementById('autoRotateBtn').addEventListener('click', () => {
    autoRotate = !autoRotate;
    document.getElementById('autoRotateBtn').classList.toggle('active', autoRotate);
  });

  window.addEventListener('resize', () => {
    const W = container.clientWidth, H = container.clientHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });
}

function onDragMove(e) {
  if (!dragStart) return;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (!isDragging && Math.sqrt(dx*dx + dy*dy) > DRAG_THRESHOLD) isDragging = true;
  if (isDragging) {
    sph.theta = dragSphStart.theta - dx * 0.005;
    sph.phi   = Math.max(0.15, Math.min(Math.PI - 0.15, dragSphStart.phi + dy * 0.005));
    updateCamera();
  }
}

/* ── Fingerprint overlay ─────────────────────────────────────────────────── */
function openHoverFingerprint(w, sx, sy) {
  const oc  = document.getElementById('umapFpCanvas');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  oc.width        = Math.round(FP_SIZE * dpr);
  oc.height       = Math.round(FP_SIZE * dpr);
  oc.style.width  = FP_SIZE + 'px';
  oc.style.height = FP_SIZE + 'px';
  oc.style.left   = (sx - FP_SIZE / 2) + 'px';
  oc.style.top    = (sy - FP_SIZE / 2) + 'px';
  oc.hidden = false;

  if (_umapFpRenderer) { _umapFpRenderer.stop(); _umapFpRenderer = null; }
  _umapFpRenderer = new FingerprintRenderer(oc, buildFingerprintParams(w), _fpCfg);
  _umapFpRenderer.start();

  const code  = w.wspr || w.id?.slice(-4).toUpperCase() || '????';
  const label = document.getElementById('umapFpLabel');
  label.textContent = 'WSPR · ' + code;
  label.style.left  = sx + 'px';
  label.style.top   = (sy - FP_SIZE / 2 - 28) + 'px';
  label.classList.add('visible');
}

function closeHoverFingerprint() {
  document.getElementById('umapFpLabel').classList.remove('visible');
  if (_umapFpRenderer) {
    const oc = document.getElementById('umapFpCanvas');
    _umapFpRenderer.shrink(() => { oc.hidden = true; _umapFpRenderer = null; });
  }
}

/* ── Detail panel ────────────────────────────────────────────────────────── */
function renderDetailPanel(w, p) {
  document.getElementById('dpEmpty').style.display = 'none';

  const showSemantics = !!_fpCfg.showSemanticLabels;
  const dim   = dominantDim(w);
  const sem   = showSemantics ? topSemanticDim(w) : null;
  const color = DIM_COLORS[dim] || '#9055D4';

  // Tags
  const tagsEl = document.getElementById('dpTags');
  tagsEl.innerHTML = '';
  if (dim) {
    const t = document.createElement('span');
    t.className = 'dp-tag dp-tag--primary';
    t.style.background = color;
    t.textContent = ACOUSTIC_LABELS[dim] || dim;
    tagsEl.appendChild(t);
  }
  if (sem) {
    const t = document.createElement('span');
    t.className = 'dp-tag dp-tag--secondary';
    t.textContent = sem;
    tagsEl.appendChild(t);
  }
  const code = w.wspr || w.id?.slice(-4).toUpperCase() || '????';
  const ct   = document.createElement('span');
  ct.className = 'dp-tag dp-tag--secondary';
  ct.style.letterSpacing = '0.08em';
  ct.textContent = 'WSPR · ' + code;
  tagsEl.appendChild(ct);

  // Quote
  const display = w.llm?.rephrased?.trim() || w.transcript?.trim() || 'wordless whisper';
  document.getElementById('dpQuote').textContent = '"' + display + '"';

  // Index counter
  const idx = points.findIndex(pt => pt.w.id === w.id);
  document.getElementById('dpBy').textContent = idx >= 0 ? `${idx + 1} / ${points.length}` : '';

  // Acoustic bars
  const comps = w.sensuality?.components || {};
  document.getElementById('dpAcousticBars').innerHTML = ACOUSTIC_DIMS.map(k => {
    const v      = comps[k], pct = v != null ? Math.round(v * 100) : 0;
    const bc     = DIM_COLORS[k] || SEM_COLOR;
    const active = focusDim === k ? ' dp-bar-row--active' : '';
    return `<div class="dp-bar-row${active}" style="--bar-accent:${bc}">
      <span class="dp-bar-label">${ACOUSTIC_LABELS[k]}</span>
      <div class="dp-bar-track"><div class="dp-bar-fill" style="width:${pct}%;background:${bc}"></div></div>
      <span class="dp-bar-val">${v != null ? v.toFixed(2) : '—'}</span>
    </div>`;
  }).join('');

  // Semantic bars
  document.getElementById('dpSemanticSection').style.display = showSemantics ? '' : 'none';
  const semData = w.llm?.semantics || {};
  document.getElementById('dpSemanticBars').innerHTML = SEMANTIC_DIMS.map(k => {
    const v      = semData[k], pct = v != null ? Math.round(Number(v) * 100) : 0;
    const active = focusDim === k ? ' dp-bar-row--active' : '';
    return `<div class="dp-bar-row${active}" style="--bar-accent:${SEM_COLOR}">
      <span class="dp-bar-label">${k}</span>
      <div class="dp-bar-track"><div class="dp-bar-fill" style="width:${pct}%;background:${SEM_COLOR}"></div></div>
      <span class="dp-bar-val">${v != null ? Number(v).toFixed(2) : '—'}</span>
    </div>`;
  }).join('');

  // Footer
  const parts = ['acoustic'];
  if (w.features?.hnr != null) parts.push('Praat/librosa');
  if (showSemantics && w.llm?.semantics) parts.push('semantic · dolphin-mistral');
  document.getElementById('dpFooter').textContent = parts.join(' · ');
}

/* ── Header viewer dots ──────────────────────────────────────────────────── */
function updateHeaderViewers() {
  const el   = document.getElementById('viewerDots');
  const dots = [{ name: 'you', color: '#FF2D8E' }, ...wsViewers];
  el.innerHTML = dots.map(v => `
    <div class="viewer-dot-wrap">
      <div class="viewer-dot" style="background:${v.color};box-shadow:0 0 0 2px #F3F2F0,0 0 0 3.5px ${v.color}88"></div>
      <span>${v.name}</span>
    </div>`).join('');
}

/* ── WebSocket ───────────────────────────────────────────────────────────── */
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws    = new WebSocket(`${proto}//${location.host}/ws?type=display`);
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'viewers') { wsViewers = msg.viewers || []; updateHeaderViewers(); }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => {};
}

/* ── Load + layout ───────────────────────────────────────────────────────── */
async function load({ silent = false } = {}) {
  if (!silent) {
    document.getElementById('centerMsg').style.display = 'flex';
    document.getElementById('centerMsg').querySelector('span:last-child').textContent = 'loading field…';
  }
  points = [];

  try { const c = await fetch('/config').then(r => r.json()); _fpCfg = buildFingerprintConfig(c); } catch {}

  let whispers;
  try {
    whispers = (await (await fetch('/whispers')).json()).whispers || [];
  } catch {
    document.getElementById('centerMsg').querySelector('span:last-child').textContent = 'could not reach server';
    return;
  }

  const valid = whispers.filter(w => featureVec(w) !== null);
  document.getElementById('atlasSubtitle').textContent = `3D · ${valid.length} whispers`;

  if (valid.length < 2) {
    document.getElementById('centerMsg').querySelector('span:last-child').textContent =
      valid.length === 0 ? 'no feature data yet' : 'need at least 2 whispers to map the field';
    return;
  }

  const vecs    = valid.map(w => featureVec(w));
  const initXYZ = pca3d(vecs);
  let finalXYZ, algo;
  if (valid.length < 8) { finalXYZ = initXYZ; algo = 'pca'; }
  else                  { finalXYZ = tsneLayout3d(vecs, initXYZ); algo = 't-sne'; }

  const scaled = normPositions(finalXYZ);

  points = valid.map((w, i) => ({
    w,
    x3d:  scaled[i][0],
    y3d:  scaled[i][1],
    z3d:  scaled[i][2],
    dim:  dominantDim(w),
    color: DIM_COLORS[dominantDim(w)] || '#9055D4',
    r:    Math.max(4, Math.min(7, 4 + (w.features?.durationLibrosa ?? w.features?.duration ?? 3) * 0.25)),
  }));

  const hasSemantic = valid.some(w => w.llm?.semantics);
  document.getElementById('atlasSubtitle').textContent =
    `3D · ${valid.length} whispers · ${algo}${hasSemantic ? ' · semantic' : ''}`;

  buildOrbs();
  buildDimChips();
  document.getElementById('centerMsg').style.display = 'none';
  whisperMap = new Map(valid.map(w => [w.id, w]));
}

/* ── Background polling ──────────────────────────────────────────────────── */
async function pollWhispers() {
  if (!whisperMap.size) return;
  let fresh;
  try { fresh = (await (await fetch('/whispers')).json()).whispers || []; }
  catch { return; }

  if (fresh.some(w => !whisperMap.has(w.id))) { await load({ silent: true }); return; }

  const freshMap = new Map(fresh.map(w => [w.id, w]));
  let anyUpdated = false;
  for (const [id, freshW] of freshMap) {
    const oldW = whisperMap.get(id);
    if (!oldW) continue;
    const llmArrived   = !oldW.llm && !!freshW.llm;
    const praatArrived = oldW.sensuality?.partial && !freshW.sensuality?.partial;
    if (!llmArrived && !praatArrived) continue;
    const pt = points.find(p => p.w.id === id);
    if (pt) Object.assign(pt.w, freshW);
    whisperMap.set(id, freshW);
    anyUpdated = true;
  }
  if (anyUpdated && pinnedId) {
    const pt = points.find(p => p.w.id === pinnedId);
    if (pt) renderDetailPanel(pt.w, pt);
  }
}

/* ── Boot ────────────────────────────────────────────────────────────────── */
updateHeaderViewers();
connectWS();
initScene();
load();
setInterval(pollWhispers, 8000);
</script>
