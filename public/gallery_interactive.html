<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>database of desires — detail</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  :root { --edge: 20px; }

  /* ── Themes ─────────────────────────────────────────────────── */
  html.theme-dark {
    --bg:        #06010f;
    --label:     rgba(255,255,255,0.52);
    --phrase:    rgba(255,255,255,0.38);
    --title:     rgba(255,255,255,0.22);
    --text-hl:   rgba(255,255,255,0.82);
    --text-body: rgba(255,255,255,0.38);
  }
  html.theme-light {
    --bg:        #d9d6df;
    --label:     #000;
    --phrase:    rgba(0,0,0,0.78);
    --title:     #000;
    --text-hl:   #000;
    --text-body: rgba(0,0,0,0.82);
  }

  body { background: var(--bg); }

  /* ── Page title ─────────────────────────────────────────────── */
  #title {
    position: fixed;
    top: var(--edge); left: var(--edge);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 500;
    font-size: calc(17px * var(--font-scale, 1));
    letter-spacing: -0.025em;
    line-height: 0.96;
    text-transform: lowercase;
    color: var(--label);
    pointer-events: none;
    z-index: 10;
    white-space: nowrap;
  }
  #title .subtitle {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-weight: 400;
    font-size: calc(11px * var(--font-scale, 1));
    letter-spacing: 0.12em;
    text-transform: lowercase;
    color: var(--phrase);
    margin-top: 6px;
  }

  /* ── Full-screen grid ───────────────────────────────────────── */
  #grid {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(var(--cols, 8), 1fr);
    grid-template-rows:    repeat(var(--rows, 4), 1fr);
    gap: 8px;
    padding: var(--edge);
  }

  /* ── Fingerprint cell ───────────────────────────────────────── */
  .cell {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    min-width: 0;
    min-height: 0;
  }
  .cell.clickable {
    cursor: pointer;
  }
  .cell.clickable:hover canvas {
    opacity: 0.85;
  }

  .canvas-wrap {
    position: relative;
    flex: 1 1 0;
    min-height: 0;
    min-width: 0;
    width: 100%;
    overflow: hidden;
  }
  .canvas-wrap canvas {
    display: block;
    width: 100%;
    height: 100%;
    transition: opacity 0.15s;
  }
  .kw-cloud {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .kw {
    position: absolute;
    color: white;
    mix-blend-mode: difference;
    font-size: 7.5px;
    letter-spacing: 0.08em;
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    text-transform: lowercase;
    opacity: 0.75;
    white-space: nowrap;
    user-select: none;
  }

  .cell-wspr {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: calc(10px * var(--font-scale, 1));
    letter-spacing: 0.18em;
    color: var(--label);
    text-transform: uppercase;
    line-height: 1;
    flex-shrink: 0;
  }

  .cell-phrase {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: calc(8.5px * var(--font-scale, 1));
    color: var(--phrase);
    text-align: left;
    line-height: 1.3;
    max-width: 100%;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    font-style: italic;
    flex-shrink: 0;
    min-height: 2.6em;
  }

  /* ── QR card ────────────────────────────────────────────────── */
  .cell-qr {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 0;
    min-width: 0;
    min-height: 0;
  }
  .cell-qr-wrap {
    width: 55%;
    aspect-ratio: 1;
    flex-shrink: 0;
  }
  .cell-qr-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  html.theme-light .cell-qr-wrap img { mix-blend-mode: multiply; }
  html.theme-dark  .cell-qr-wrap img { filter: invert(1); mix-blend-mode: screen; }
  .cell-qr-label {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: calc(7px * var(--font-scale, 1));
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--label);
    text-align: left;
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── Text card ──────────────────────────────────────────────── */
  .cell-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 14px 0;
    min-width: 0;
    min-height: 0;
  }
  .cell-text-hl {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: calc(21px * var(--font-scale, 1));
    letter-spacing: -0.05em;
    line-height: 1.0;
    color: var(--text-hl);
    margin-bottom: 12px;
    white-space: pre-line;
    text-align: left;
  }
  .cell-text-body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 400;
    font-size: calc(9px * var(--font-scale, 1));
    line-height: 1.6;
    color: var(--text-body);
    text-align: left;
  }

  /* ── Overlay — fade-in dark panel ──────────────────────────── */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(6,1,15,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.45s ease;
    pointer-events: none;
  }
  #overlay.visible { opacity: 1; pointer-events: auto; }
  #overlay[hidden] { display: none; }

  #overlay-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.28);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  #overlay-close:hover { color: rgba(255,255,255,0.72); }

  #overlay-canvas {
    display: block;
    width:  min(80vw, 78vh);
    height: min(80vw, 78vh);
    flex-shrink: 0;
  }

  /* ── Quote below canvas ───── */
  #overlay-quote {
    max-width: min(80vw, 78vh);
    width: 100%;
    text-align: center;
    margin-top: 20px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-style: italic;
    font-size: clamp(15px, 2.2vw, 26px);
    line-height: 1.35;
    color: rgba(255,255,255,0.80);
    padding: 0 8px;
  }

  /* ── Side variable strips ───── */
  #overlay-left, #overlay-right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 150px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #overlay-left  { left: 24px; }
  #overlay-right { right: 24px; }

  .ov-bar-row { display: flex; align-items: center; gap: 6px; }
  .ov-bar-name {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    min-width: 70px;
  }
  #overlay-right .ov-bar-name { text-align: right; }
  .ov-bar-track { flex: 1; height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; }
  .ov-bar-fill  { height: 2px; background: rgba(255,255,255,0.38); border-radius: 1px; }
  .ov-bar-val {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.25);
    width: 24px;
    flex-shrink: 0;
  }
  #overlay-left  .ov-bar-val { text-align: right; }
  #overlay-right .ov-bar-val { text-align: left; }

  /* ── bottom strip ───── */
  #overlay-foot {
    position: absolute;
    bottom: 20px;
    left: 24px;
    right: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Overlay: audio ───── */
  .ov-audio { flex-shrink: 0; }
  .ov-audio audio {
    width: 180px;
    height: 28px;
    opacity: 0.6;
    filter: invert(1) hue-rotate(200deg) brightness(0.6);
  }
  .ov-audio audio:hover { opacity: 0.9; }

  /* ── Overlay: pending note ───── */
  .ov-pending {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.18);
    font-style: italic;
  }
</style>
</head>
<body>

<div id="title">database of desires<div class="subtitle">sex tech sabrina</div></div>
<div id="grid"></div>

<!-- detail overlay (full-screen, hidden until a cell is clicked) -->
<div id="overlay" hidden>
  <button id="overlay-close" aria-label="close">×</button>
  <div id="overlay-left"></div>
  <canvas id="overlay-canvas"></canvas>
  <div id="overlay-quote"></div>
  <div id="overlay-right"></div>
  <div id="overlay-foot"></div>
</div>

<script src="/public/fingerprint.js"></script>
<script>
(async () => {
  const INITIAL_STAGGER = 320;
  const PARADE_START    = 15000;
  const DARK_PAUSE      = 600;

  // ── Config ────────────────────────────────────────────────────
  let cfg = {};
  try { cfg = await fetch('/config').then(r => r.json()); } catch {}

  const THEME      = cfg.galleryTheme ?? 'dark';
  const fpCfg = {
    ...buildFingerprintConfig(cfg),
    blendMode:          'screen',   // overlay canvas always on dark bg
    semanticLabelColor: '#ffffff',
    maskShape:          cfg.fp_maskShape ?? 'rect',
  };
  const fpCfgOverlay = {
    ...buildFingerprintConfig(cfg),
    blendMode:               'screen',
    semanticLabelColor:      '#ffffff',
    maskShape:               'circle',
    showSemanticLabels:      true,
    semanticLabelThreshold:  0,   // show all labels regardless of score
  };
  const gridFpCfg = {
    ...fpCfg,
    blendMode:              THEME === 'light' ? 'multiply' : 'screen',
    semanticLabelColor:     THEME === 'light' ? '#000000'  : '#ffffff',
    showSemanticLabels:     true,
    semanticLabelThreshold: 0.51,  // only labels where value > 0.5 (excludes neutral defaults)
  };
  const COLS          = Math.max(1, cfg.galleryCols          ?? 8);
  const ROWS          = Math.max(1, cfg.galleryRows          ?? 4);
  const FONT_SCALE    = cfg.galleryFontScale ?? 1.0;
  const PARADE_INTERVAL = Math.max(2000, cfg.galleryParadeInterval ?? 10000);
  const MAX           = Math.max(1, cfg.galleryMaxWhispers   ?? 32);
  const TOTAL         = COLS * ROWS;

  document.documentElement.className = `theme-${THEME}`;
  document.documentElement.style.setProperty('--cols', COLS);
  document.documentElement.style.setProperty('--rows', ROWS);
  document.documentElement.style.setProperty('--font-scale', FONT_SCALE);

  // ── Fixed card positions ──────────────────────────────────────
  const textRow  = Math.floor(ROWS / 2);
  const textCol  = Math.max(0, COLS - 2);
  const TEXT_IDX = textRow * COLS + textCol;
  const QR_IDX   = (ROWS - 1) * COLS;

  function buildQrCard() {
    const cell = document.createElement('div');
    cell.className = 'cell cell-qr';
    const label = document.createElement('span');
    label.className = 'cell-qr-label';
    label.textContent = 'scan to participate';
    const wrap = document.createElement('div');
    wrap.className = 'cell-qr-wrap';
    const img = document.createElement('img');
    img.src = '/public/qr-code.png';
    img.alt = 'scan to participate';
    wrap.appendChild(img);
    cell.appendChild(label);
    cell.appendChild(wrap);
    return cell;
  }

  function buildTextCard() {
    const cell = document.createElement('div');
    cell.className = 'cell cell-text';
    const hl = document.createElement('div');
    hl.className = 'cell-text-hl';
    hl.textContent = 'Record a fantasy.\nKeep the secret.';
    const body = document.createElement('div');
    body.className = 'cell-text-body';
    body.textContent = 'This installation transforms recorded fantasies into unintelligible whispers, dissolving meaning while preserving intimacy.';
    cell.appendChild(hl);
    cell.appendChild(body);
    return cell;
  }

  // ── Deterministic position seeder for keyword clouds ─────────
  function seededFrac(idStr, i) {
    let h = 0;
    for (let j = 0; j < idStr.length; j++) h = (Math.imul(31, h) + idStr.charCodeAt(j)) | 0;
    h = (Math.imul(h ^ (i * 2654435761 | 0), 1540483477)) | 0;
    return (h >>> 0) / 0xFFFFFFFF;
  }

  // ── Grid state ────────────────────────────────────────────────
  const grid = document.getElementById('grid');
  let cells   = [];
  let cellMap = new Map();
  let ro      = null;
  let paradeTimer = null;

  function stopAll() {
    if (paradeTimer) { clearTimeout(paradeTimer); paradeTimer = null; }
    if (ro) { ro.disconnect(); ro = null; }
    cells.forEach(c => { if (c?.renderer) { c.renderer.stop(); c.renderer = null; } });
    cells = [];
    cellMap = new Map();
    grid.innerHTML = '';
  }

  function activateCell(cell) {
    if (cell.renderer) { cell.renderer.stop(); cell.renderer = null; }
    if (cell.canvas.width < 4 || cell.canvas.height < 4) return;
    const r = new FingerprintRenderer(cell.canvas, cell.params, gridFpCfg);
    cell.renderer = r;
    r.start();
  }

  function buildGrid(whispers) {
    stopAll();
    const n = whispers.length;
    let wIdx = 0;

    for (let i = 0; i < TOTAL; i++) {
      if (i === TEXT_IDX) { grid.appendChild(buildTextCard()); cells.push(null); continue; }
      if (i === QR_IDX)   { grid.appendChild(buildQrCard());  cells.push(null); continue; }

      let params  = null;
      let whisper = null;
      if (n > 0) {
        const realIdx  = wIdx % n;
        const tilePass = Math.floor(wIdx / n);
        whisper = whispers[realIdx];
        params  = buildFingerprintParams(whisper);
        if (tilePass > 0) params = { ...params, seed: String(params.seed) + '~' + tilePass };
      }
      wIdx++;

      const cell   = document.createElement('div');
      const isReal = whisper !== null && (wIdx - 1) < n;
      cell.className = isReal ? 'cell clickable' : 'cell';

      const canvas = document.createElement('canvas');
      canvas.width = 1; canvas.height = 1;

      const canvasWrap = document.createElement('div');
      canvasWrap.className = 'canvas-wrap';
      canvasWrap.appendChild(canvas);

      const wspr   = document.createElement('span'); wspr.className = 'cell-wspr';
      const phrase = document.createElement('span'); phrase.className = 'cell-phrase';
      if (isReal) {
        wspr.textContent = whisper.wspr ?? whisper.id?.slice(-4) ?? '';
        const txt = (whisper.llm?.rephrased ?? '').trim();
        phrase.textContent = txt.length > 55 ? txt.slice(0, 55) + '…' : txt;

        const kws = whisper.llm?.keywords;
        if (kws?.length && whisper.id) {
          const cloud = document.createElement('div');
          cloud.className = 'kw-cloud';
          kws.forEach((word, ki) => {
            const span = document.createElement('span');
            span.className = 'kw';
            span.textContent = word;
            span.style.left   = (8 + seededFrac(whisper.id, ki * 3)     * 72) + '%';
            span.style.top    = (8 + seededFrac(whisper.id, ki * 3 + 1)  * 72) + '%';
            span.style.rotate = (seededFrac(whisper.id, ki * 3 + 2) * 30 - 15) + 'deg';
            cloud.appendChild(span);
          });
          canvasWrap.appendChild(cloud);
        }
      }

      cell.appendChild(canvasWrap);
      cell.appendChild(wspr);
      cell.appendChild(phrase);
      grid.appendChild(cell);

      const cellObj = { canvas, canvasWrap, params, renderer: null, whisper: isReal ? whisper : null };
      cells.push(cellObj);
      cellMap.set(canvasWrap, cellObj);

      if (isReal) {
        cell.addEventListener('click', () => openOverlay(cellObj.whisper));
      }
    }

    const activeCells = cells.filter(c => c !== null && c.params !== null);
    if (activeCells.length === 0) return;

    ro = new ResizeObserver(entries => {
      for (const e of entries) {
        const cell = cellMap.get(e.target);
        if (!cell || !cell.params) continue;
        const w = Math.round(e.contentRect.width);
        const h = Math.round(e.contentRect.height);
        if (w < 4 || h < 4 || (cell.canvas.width === w && cell.canvas.height === h)) continue;
        cell.canvas.width  = w;
        cell.canvas.height = h;
        if (cell.renderer) { cell.renderer.stop(); cell.renderer = null; }
      }
    });
    cells.forEach(c => { if (c) ro.observe(c.canvasWrap); });

    setTimeout(() => {
      activeCells.forEach((cell, i) => setTimeout(() => activateCell(cell), i * INITIAL_STAGGER));
    }, 100);

    let paradeIdx = 0;
    function paradeNext() {
      const cell = activeCells[paradeIdx % activeCells.length];
      paradeIdx++;
      if (cell.renderer) {
        cell.renderer.shrink(() => setTimeout(() => activateCell(cell), DARK_PAUSE));
      }
      paradeTimer = setTimeout(paradeNext, PARADE_INTERVAL);
    }
    paradeTimer = setTimeout(paradeNext, PARADE_START);
  }

  // ── Fetch ─────────────────────────────────────────────────────
  async function fetchWhispers() {
    try {
      const data = await fetch('/whispers').then(r => r.json());
      return (data.whispers || []).slice(0, MAX);
    } catch { return []; }
  }

  let whispers = await fetchWhispers();
  buildGrid(whispers);

  const POLL_INTERVAL = 15000;
  function gridSig(ws) {
    const llmCount = ws.filter(w => w.llm?.semantics).length;
    return (ws[0]?.id ?? '') + '|' + ws.length + '|' + llmCount;
  }
  let lastSig = gridSig(whispers);
  setInterval(async () => {
    const fresh = await fetchWhispers();
    const sig = gridSig(fresh);
    if (sig !== lastSig) {
      lastSig = sig;
      whispers = fresh;
      buildGrid(whispers);
    }
  }, POLL_INTERVAL);

  // ── Overlay state ─────────────────────────────────────────────
  const overlay       = document.getElementById('overlay');
  const overlayClose  = document.getElementById('overlay-close');
  const overlayLeft   = document.getElementById('overlay-left');
  const overlayRight  = document.getElementById('overlay-right');
  const overlayQuote  = document.getElementById('overlay-quote');
  const overlayFoot   = document.getElementById('overlay-foot');
  const overlayCanvas = document.getElementById('overlay-canvas');
  let ovRenderer = null;

  function audioSrc(w) {
    const f = w.generatedWhisperFile ?? w.audioFile;
    return f ? `/${f}` : null;
  }

  function barRow(name, val, alignRight) {
    const v = (val != null && !isNaN(val)) ? Math.max(0, Math.min(1, val)) : null;
    const pct = v != null ? (v * 100).toFixed(0) : '0';
    const display = v != null ? v.toFixed(2) : '—';
    if (alignRight) {
      return `<div class="ov-bar-row">
        <span class="ov-bar-val">${display}</span>
        <div class="ov-bar-track"><div class="ov-bar-fill" style="width:${pct}%"></div></div>
        <span class="ov-bar-name">${name}</span>
      </div>`;
    }
    return `<div class="ov-bar-row">
      <span class="ov-bar-name">${name}</span>
      <div class="ov-bar-track"><div class="ov-bar-fill" style="width:${pct}%"></div></div>
      <span class="ov-bar-val">${display}</span>
    </div>`;
  }

  function openOverlay(w) {
    if (ovRenderer) { ovRenderer.stop(); ovRenderer = null; }

    const rephrased = (w.llm?.rephrased ?? w.transcript ?? '').trim();
    const src       = audioSrc(w);
    const comp      = w.sensuality?.components ?? {};
    const sem       = w.llm?.semantics ?? {};

    // Centered quote below fingerprint
    overlayQuote.textContent = rephrased;

    // Left strip — acoustic variables (normalized 0-1 from sensuality.components)
    overlayLeft.innerHTML = [
      barRow('breathiness',      comp.breathiness,     false),
      barRow('darkness',         comp.darkness,        false),
      barRow('softness',         comp.softness,        false),
      barRow('pitch lowness',    comp.pitchLowness,    false),
      barRow('pitch steadiness', comp.pitchSteadiness, false),
      barRow('slowness',         comp.slowness,        false),
    ].join('');

    // Right strip — semantic variables
    overlayRight.innerHTML = [
      barRow('sensory',     sem.sensory,     true),
      barRow('relational',  sem.relational,  true),
      barRow('taboo',       sem.taboo,       true),
      barRow('tenderness',  sem.tenderness,  true),
      barRow('fantasy',     sem.fantasy,     true),
      barRow('identity',    sem.identity,    true),
      barRow('longing',     sem.longing,     true),
      barRow('unspeakable', sem.unspeakable, true),
    ].join('');

    // Footer — audio only
    overlayFoot.innerHTML = src
      ? `<div class="ov-audio"><audio controls src="${src}"></audio></div>`
      : '';

    // Fade in, then start renderer after layout settles
    overlay.removeAttribute('hidden');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      overlay.classList.add('visible');
      const rect = overlayCanvas.getBoundingClientRect();
      const cw = Math.round(rect.width);
      const ch = Math.round(rect.height);
      if (cw > 4 && ch > 4) {
        overlayCanvas.width  = cw;
        overlayCanvas.height = ch;
      }
      const params = buildFingerprintParams(w);
      ovRenderer = new FingerprintRenderer(overlayCanvas, params, fpCfgOverlay);
      ovRenderer.start();
    }));
  }

  function closeOverlay() {
    overlay.classList.remove('visible');
    overlay.addEventListener('transitionend', () => {
      overlay.setAttribute('hidden', '');
      if (ovRenderer) { ovRenderer.stop(); ovRenderer = null; }
    }, { once: true });
    if (ovRenderer) ovRenderer.shrink(() => {});
  }

  overlayClose.addEventListener('click', closeOverlay);

  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeOverlay();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !overlay.hasAttribute('hidden')) closeOverlay();
  });

})();
</script>
</body>
</html>
