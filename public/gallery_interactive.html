<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>whisper field — detail</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  :root { --edge: 20px; }

  /* ── Themes ─────────────────────────────────────────────────── */
  html.theme-dark {
    --bg:        #06010f;
    --label:     rgba(255,255,255,0.52);
    --phrase:    rgba(255,255,255,0.38);
    --title:     rgba(255,255,255,0.22);
    --text-hl:   rgba(255,255,255,0.82);
    --text-body: rgba(255,255,255,0.38);
  }
  html.theme-light {
    --bg:        #d9d6df;
    --label:     #000;
    --phrase:    rgba(0,0,0,0.78);
    --title:     #000;
    --text-hl:   #000;
    --text-body: rgba(0,0,0,0.82);
  }

  body { background: var(--bg); }

  /* ── Page title ─────────────────────────────────────────────── */
  #title {
    position: fixed;
    top: var(--edge); left: var(--edge);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 500;
    font-size: calc(17px * var(--font-scale, 1));
    letter-spacing: -0.025em;
    line-height: 0.96;
    text-transform: lowercase;
    color: var(--label);
    pointer-events: none;
    z-index: 10;
    white-space: nowrap;
  }
  #title .subtitle {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-weight: 400;
    font-size: calc(11px * var(--font-scale, 1));
    letter-spacing: 0.12em;
    text-transform: lowercase;
    color: var(--phrase);
    margin-top: 6px;
  }

  /* ── Full-screen grid ───────────────────────────────────────── */
  #grid {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(var(--cols, 8), 1fr);
    grid-template-rows:    repeat(var(--rows, 4), 1fr);
    gap: 8px;
    padding: var(--edge);
  }

  /* ── Fingerprint cell ───────────────────────────────────────── */
  .cell {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    min-width: 0;
    min-height: 0;
  }
  .cell.clickable {
    cursor: pointer;
  }
  .cell.clickable:hover canvas {
    opacity: 0.85;
  }

  .cell canvas {
    flex: 1 1 0;
    min-height: 0;
    min-width: 0;
    width: 100%;
    height: 0;
    display: block;
    transition: opacity 0.15s;
  }

  .cell-wspr {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: calc(10px * var(--font-scale, 1));
    letter-spacing: 0.18em;
    color: var(--label);
    text-transform: uppercase;
    line-height: 1;
    flex-shrink: 0;
  }

  .cell-phrase {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: calc(8.5px * var(--font-scale, 1));
    color: var(--phrase);
    text-align: left;
    line-height: 1.3;
    max-width: 100%;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    font-style: italic;
    flex-shrink: 0;
    min-height: 2.6em;
  }

  /* ── QR card ────────────────────────────────────────────────── */
  .cell-qr {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    gap: 8px;
    padding: 12px 0;
    min-width: 0;
    min-height: 0;
  }
  .cell-qr-wrap {
    width: 55%;
    aspect-ratio: 1;
    flex-shrink: 0;
  }
  .cell-qr-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  html.theme-light .cell-qr-wrap img { mix-blend-mode: multiply; }
  html.theme-dark  .cell-qr-wrap img { filter: invert(1); mix-blend-mode: screen; }
  .cell-qr-label {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: calc(7px * var(--font-scale, 1));
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--label);
    text-align: left;
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── Text card ──────────────────────────────────────────────── */
  .cell-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 14px 0;
    min-width: 0;
    min-height: 0;
  }
  .cell-text-hl {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: calc(21px * var(--font-scale, 1));
    letter-spacing: -0.05em;
    line-height: 1.0;
    color: var(--text-hl);
    margin-bottom: 12px;
    white-space: pre-line;
    text-align: left;
  }
  .cell-text-body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 400;
    font-size: calc(9px * var(--font-scale, 1));
    line-height: 1.6;
    color: var(--text-body);
    text-align: left;
  }

  /* ── Overlay — fade-in dark panel ──────────────────────────── */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(6,1,15,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.45s ease;
    pointer-events: none;
  }
  #overlay.visible { opacity: 1; pointer-events: auto; }
  #overlay[hidden] { display: none; }

  #overlay-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.28);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  #overlay-close:hover { color: rgba(255,255,255,0.72); }

  #overlay-canvas {
    display: block;
    width:  min(80vw, 78vh);
    height: min(80vw, 78vh);
    flex-shrink: 0;
  }

  /* ── bottom strip ───── */
  #overlay-foot {
    position: absolute;
    bottom: 20px;
    left: 24px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  /* ── Overlay: footer elements ───── */
  .ov-rephrased {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-style: italic;
    font-size: 13px;
    line-height: 1.5;
    color: rgba(255,255,255,0.55);
    min-width: 0;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .ov-score-block {
    text-align: right;
    flex-shrink: 0;
  }
  .ov-score-num {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.04em;
    line-height: 1;
    color: #FF2D8E;
  }
  .ov-score-label {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    margin-top: 2px;
  }
  .ov-partial {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 8px;
    color: rgba(255,255,255,0.18);
  }

  /* ── Overlay: audio ───── */
  .ov-audio { flex-shrink: 0; }
  .ov-audio audio {
    width: 180px;
    height: 28px;
    opacity: 0.6;
    filter: invert(1) hue-rotate(200deg) brightness(0.6);
  }
  .ov-audio audio:hover { opacity: 0.9; }

  /* ── Overlay: pending note ───── */
  .ov-pending {
    font-family: 'IBM Plex Mono', 'SF Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.18);
    font-style: italic;
  }
</style>
</head>
<body>

<div id="title">whisper field<div class="subtitle">sex tech sabrina</div></div>
<div id="grid"></div>

<!-- detail overlay (full-screen, hidden until a cell is clicked) -->
<div id="overlay" hidden>
  <button id="overlay-close" aria-label="close">×</button>
  <canvas id="overlay-canvas"></canvas>
  <div id="overlay-foot"></div>
</div>

<script src="/public/fingerprint.js"></script>
<script>
(async () => {
  const INITIAL_STAGGER = 320;
  const PARADE_START    = 15000;
  const DARK_PAUSE      = 600;

  // ── Config ────────────────────────────────────────────────────
  let cfg = {};
  try { cfg = await fetch('/config').then(r => r.json()); } catch {}

  const THEME      = cfg.galleryTheme ?? 'dark';
  const fpCfg = {
    ...buildFingerprintConfig(cfg),
    blendMode:          'screen',   // overlay canvas always on dark bg
    semanticLabelColor: '#ffffff',
    maskShape:          cfg.fp_maskShape ?? 'rect',
  };
  const fpCfgOverlay = {
    ...buildFingerprintConfig(cfg),
    blendMode:               'screen',
    semanticLabelColor:      '#ffffff',
    maskShape:               'circle',
    showSemanticLabels:      true,
    semanticLabelThreshold:  0,   // show all labels regardless of score
  };
  const gridFpCfg = {
    ...fpCfg,
    blendMode:          THEME === 'light' ? 'multiply' : 'screen',
    semanticLabelColor: THEME === 'light' ? '#000000'  : '#ffffff',
  };
  const COLS          = Math.max(1, cfg.galleryCols          ?? 8);
  const ROWS          = Math.max(1, cfg.galleryRows          ?? 4);
  const FONT_SCALE    = cfg.galleryFontScale ?? 1.0;
  const PARADE_INTERVAL = Math.max(2000, cfg.galleryParadeInterval ?? 10000);
  const MAX           = Math.max(1, cfg.galleryMaxWhispers   ?? 32);
  const TOTAL         = COLS * ROWS;

  document.documentElement.className = `theme-${THEME}`;
  document.documentElement.style.setProperty('--cols', COLS);
  document.documentElement.style.setProperty('--rows', ROWS);
  document.documentElement.style.setProperty('--font-scale', FONT_SCALE);

  // ── Fixed card positions ──────────────────────────────────────
  const textRow  = Math.floor(ROWS / 2);
  const textCol  = Math.max(0, COLS - 2);
  const TEXT_IDX = textRow * COLS + textCol;
  const QR_IDX   = (ROWS - 1) * COLS;

  function buildQrCard() {
    const cell = document.createElement('div');
    cell.className = 'cell cell-qr';
    const label = document.createElement('span');
    label.className = 'cell-qr-label';
    label.textContent = 'scan to participate';
    const wrap = document.createElement('div');
    wrap.className = 'cell-qr-wrap';
    const img = document.createElement('img');
    img.src = '/public/qr-code.png';
    img.alt = 'scan to participate';
    wrap.appendChild(img);
    cell.appendChild(label);
    cell.appendChild(wrap);
    return cell;
  }

  function buildTextCard() {
    const cell = document.createElement('div');
    cell.className = 'cell cell-text';
    const hl = document.createElement('div');
    hl.className = 'cell-text-hl';
    hl.textContent = 'Record a fantasy.\nKeep the secret.';
    const body = document.createElement('div');
    body.className = 'cell-text-body';
    body.textContent = 'This installation transforms recorded fantasies into unintelligible whispers, dissolving meaning while preserving intimacy.';
    cell.appendChild(hl);
    cell.appendChild(body);
    return cell;
  }

  // ── Grid state ────────────────────────────────────────────────
  const grid = document.getElementById('grid');
  let cells   = [];
  let cellMap = new Map();
  let ro      = null;
  let paradeTimer = null;

  function stopAll() {
    if (paradeTimer) { clearTimeout(paradeTimer); paradeTimer = null; }
    if (ro) { ro.disconnect(); ro = null; }
    cells.forEach(c => { if (c?.renderer) { c.renderer.stop(); c.renderer = null; } });
    cells = [];
    cellMap = new Map();
    grid.innerHTML = '';
  }

  function activateCell(cell) {
    if (cell.renderer) { cell.renderer.stop(); cell.renderer = null; }
    if (cell.canvas.width < 4 || cell.canvas.height < 4) return;
    const r = new FingerprintRenderer(cell.canvas, cell.params, gridFpCfg);
    cell.renderer = r;
    r.start();
  }

  function buildGrid(whispers) {
    stopAll();
    const n = whispers.length;
    let wIdx = 0;

    for (let i = 0; i < TOTAL; i++) {
      if (i === TEXT_IDX) { grid.appendChild(buildTextCard()); cells.push(null); continue; }
      if (i === QR_IDX)   { grid.appendChild(buildQrCard());  cells.push(null); continue; }

      let params  = null;
      let whisper = null;
      if (n > 0) {
        const realIdx  = wIdx % n;
        const tilePass = Math.floor(wIdx / n);
        whisper = whispers[realIdx];
        params  = buildFingerprintParams(whisper);
        if (tilePass > 0) params = { ...params, seed: String(params.seed) + '~' + tilePass };
      }
      wIdx++;

      const cell   = document.createElement('div');
      const isReal = whisper !== null && (wIdx - 1) < n;
      cell.className = isReal ? 'cell clickable' : 'cell';

      const canvas = document.createElement('canvas');
      canvas.width = 1; canvas.height = 1;

      const wspr   = document.createElement('span'); wspr.className = 'cell-wspr';
      const phrase = document.createElement('span'); phrase.className = 'cell-phrase';
      if (isReal) {
        wspr.textContent = whisper.wspr ?? whisper.id?.slice(-4) ?? '';
        const txt = (whisper.llm?.rephrased ?? '').trim();
        phrase.textContent = txt.length > 55 ? txt.slice(0, 55) + '…' : txt;
      }

      cell.appendChild(canvas);
      cell.appendChild(wspr);
      cell.appendChild(phrase);
      grid.appendChild(cell);

      const cellObj = { canvas, params, renderer: null, whisper: isReal ? whisper : null };
      cells.push(cellObj);
      cellMap.set(canvas, cellObj);

      if (isReal) {
        cell.addEventListener('click', () => openOverlay(cellObj.whisper));
      }
    }

    const activeCells = cells.filter(c => c !== null && c.params !== null);
    if (activeCells.length === 0) return;

    ro = new ResizeObserver(entries => {
      for (const e of entries) {
        const cell = cellMap.get(e.target);
        if (!cell || !cell.params) continue;
        const w = Math.round(e.contentRect.width);
        const h = Math.round(e.contentRect.height);
        if (w < 4 || h < 4 || (cell.canvas.width === w && cell.canvas.height === h)) continue;
        cell.canvas.width  = w;
        cell.canvas.height = h;
        if (cell.renderer) { cell.renderer.stop(); cell.renderer = null; }
      }
    });
    cells.forEach(c => { if (c) ro.observe(c.canvas); });

    setTimeout(() => {
      activeCells.forEach((cell, i) => setTimeout(() => activateCell(cell), i * INITIAL_STAGGER));
    }, 100);

    let paradeIdx = 0;
    function paradeNext() {
      const cell = activeCells[paradeIdx % activeCells.length];
      paradeIdx++;
      if (cell.renderer) {
        cell.renderer.shrink(() => setTimeout(() => activateCell(cell), DARK_PAUSE));
      }
      paradeTimer = setTimeout(paradeNext, PARADE_INTERVAL);
    }
    paradeTimer = setTimeout(paradeNext, PARADE_START);
  }

  // ── Fetch ─────────────────────────────────────────────────────
  async function fetchWhispers() {
    try {
      const data = await fetch('/whispers').then(r => r.json());
      return (data.whispers || []).slice(0, MAX);
    } catch { return []; }
  }

  let whispers = await fetchWhispers();
  buildGrid(whispers);

  const POLL_INTERVAL = 15000;
  let lastFirstId = whispers[0]?.id ?? null;
  setInterval(async () => {
    const fresh = await fetchWhispers();
    const newFirstId = fresh[0]?.id ?? null;
    if (newFirstId !== lastFirstId) {
      lastFirstId = newFirstId;
      whispers = fresh;
      buildGrid(whispers);
    }
  }, POLL_INTERVAL);

  // ── Overlay state ─────────────────────────────────────────────
  const overlay       = document.getElementById('overlay');
  const overlayClose  = document.getElementById('overlay-close');
  const overlayFoot   = document.getElementById('overlay-foot');
  const overlayCanvas = document.getElementById('overlay-canvas');
  let ovRenderer = null;

  function audioSrc(w) {
    const f = w.generatedWhisperFile ?? w.audioFile;
    return f ? `/${f}` : null;
  }

  function openOverlay(w) {
    if (ovRenderer) { ovRenderer.stop(); ovRenderer = null; }

    const rephrased = (w.llm?.rephrased ?? w.transcript ?? '').trim();
    const score   = w.sensuality?.score;
    const partial = w.sensuality?.partial;
    const src     = audioSrc(w);

    // Footer: rephrased text + score + audio
    const scoreHtml = score != null
      ? `<div class="ov-score-block">
           <div class="ov-score-num">${(score * 100).toFixed(0)}</div>
           <div class="ov-score-label">sensuality index</div>
           ${partial ? '<div class="ov-partial">partial</div>' : ''}
         </div>`
      : '<div></div>';
    const audioHtml = src
      ? `<div class="ov-audio"><audio controls src="${src}"></audio></div>`
      : '<div></div>';

    overlayFoot.innerHTML = `
      ${rephrased ? `<div class="ov-rephrased">${rephrased}</div>` : '<div></div>'}
      ${scoreHtml}
      ${audioHtml}
    `;

    // Fade in, then start renderer after layout settles
    overlay.removeAttribute('hidden');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      overlay.classList.add('visible');
      const rect = overlayCanvas.getBoundingClientRect();
      const cw = Math.round(rect.width);
      const ch = Math.round(rect.height);
      if (cw > 4 && ch > 4) {
        overlayCanvas.width  = cw;
        overlayCanvas.height = ch;
      }
      const params = buildFingerprintParams(w);
      ovRenderer = new FingerprintRenderer(overlayCanvas, params, fpCfgOverlay);
      ovRenderer.start();
    }));
  }

  function closeOverlay() {
    overlay.classList.remove('visible');
    overlay.addEventListener('transitionend', () => {
      overlay.setAttribute('hidden', '');
      if (ovRenderer) { ovRenderer.stop(); ovRenderer = null; }
    }, { once: true });
    if (ovRenderer) ovRenderer.shrink(() => {});
  }

  overlayClose.addEventListener('click', closeOverlay);

  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeOverlay();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !overlay.hasAttribute('hidden')) closeOverlay();
  });

})();
</script>
</body>
</html>
